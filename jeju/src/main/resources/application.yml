server:
  port: ${PORT:8101}
  tomcat:
    max-http-form-post-size: 200MB
spring:
  application:
    name: jeju
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jeju}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1004}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
        type:
          preferred_enum_type: VARCHAR
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
  thymeleaf:
    cache: ${SPRING_THYMELEAF_CACHE:false}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB
file:
  upload-dir: ${FILE_UPLOAD_DIR:/tmp/jeju/uploads/}
